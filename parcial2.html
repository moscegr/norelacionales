<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcial II - CBTis 134 - Ing. Garcia Ramos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .font-mono { font-family: 'Fira Code', monospace; }
        
        .gradient-header {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
        }
        
        .week-tab {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .week-tab.active {
            background-color: white;
            color: #4338ca !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-weight: 800;
        }

        .code-container {
            background-color: #0d1117;
            position: relative;
            border: 1px solid #30363d;
        }

        .code-container::before {
            content: "SHELL INTERACTIVO / AGGREGATION";
            position: absolute;
            top: 10px;
            right: 15px;
            color: #8b949e;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .concept-badge {
            background: rgba(79, 70, 229, 0.1);
            color: #4338ca;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            border: 1px solid rgba(79, 70, 229, 0.2);
        }

        .animate-content {
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .theory-card strong { color: #4338ca; font-weight: 700; }
        .example-box { border-left: 4px solid #6366f1; background-color: #f5f3ff; padding: 1rem; border-radius: 0.5rem; }
        
        /* Diagram styling */
        .diagram-node {
            background: white;
            border: 2px solid #e0e7ff;
            border-radius: 12px;
            padding: 10px;
            font-size: 0.75rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .diagram-arrow {
            color: #6366f1;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <!-- Navegación -->
    <nav class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html" class="flex items-center space-x-2 text-indigo-600 hover:text-indigo-800 transition group">
                    <i class="fas fa-home"></i>
                    <span class="font-bold uppercase tracking-tighter text-sm">CBTis 134 • Inicio</span>
                </a>
                <div class="flex items-center space-x-6 text-xs font-bold uppercase tracking-widest text-slate-400">
                    <a href="parcial1.html" class="hover:text-indigo-600 transition">Parcial I</a>
                    <span class="text-indigo-600 border-b-2 border-indigo-600 pb-1">Parcial II</span>
                    <span class="opacity-30">Parcial III</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header Lección -->
    <header class="gradient-header text-white py-16 px-4 text-center relative overflow-hidden">
        <div class="max-w-4xl mx-auto relative z-10">
            <h1 class="text-3xl md:text-5xl font-black mb-4 tracking-tight uppercase italic">Parcial II: Big Data & Analytics</h1>
            <p class="text-indigo-100 text-lg opacity-95 max-w-2xl mx-auto italic leading-snug">
                Dominando el Pipeline de Agregación: <span class="text-white font-bold underline">Análisis masivo, Uniones e Índices de Alto Rendimiento</span>.
            </p>
        </div>
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
            <i class="fas fa-layer-group text-[25rem] absolute -bottom-20 -left-20"></i>
        </div>
    </header>

    <!-- Navegación Semanal -->
    <section class="max-w-7xl mx-auto px-4 -mt-10 relative z-20">
        <div class="bg-slate-200/60 backdrop-blur-xl p-1.5 rounded-2xl shadow-xl flex flex-wrap justify-center gap-1.5 border border-white/30">
            <button onclick="switchWeek(6)" id="tab6" class="week-tab active flex-1 min-w-[110px] py-4 rounded-xl font-bold text-xs uppercase flex flex-col items-center">
                <span class="opacity-60 text-[9px] mb-1 italic">I. Pipeline</span>
                <span>Semana 06</span>
            </button>
            <button onclick="switchWeek(7)" id="tab7" class="week-tab text-slate-600 flex-1 min-w-[110px] py-4 rounded-xl font-bold text-xs uppercase flex flex-col items-center hover:bg-white/50 transition">
                <span class="opacity-60 text-[9px] mb-1 italic">II. Agregación</span>
                <span>Semana 07</span>
            </button>
            <button onclick="switchWeek(8)" id="tab8" class="week-tab text-slate-600 flex-1 min-w-[110px] py-4 rounded-xl font-bold text-xs uppercase flex flex-col items-center hover:bg-white/50 transition">
                <span class="opacity-60 text-[9px] mb-1 italic">III. Uniones</span>
                <span>Semana 08</span>
            </button>
            <button onclick="switchWeek(9)" id="tab9" class="week-tab text-slate-600 flex-1 min-w-[110px] py-4 rounded-xl font-bold text-xs uppercase flex flex-col items-center hover:bg-white/50 transition">
                <span class="opacity-60 text-[9px] mb-1 italic">IV. Índices</span>
                <span>Semana 09</span>
            </button>
            <button onclick="switchWeek(10)" id="tab10" class="week-tab text-slate-600 flex-1 min-w-[110px] py-4 rounded-xl font-bold text-xs uppercase flex flex-col items-center hover:bg-white/50 transition">
                <span class="opacity-60 text-[9px] mb-1 italic">V. Performance</span>
                <span>Semana 10</span>
            </button>
        </div>
    </section>

    <!-- Contenedor Dinámico -->
    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="week-content" class="animate-content">
            <!-- Inyectado por JS -->
        </div>
    </main>

    <footer class="bg-slate-950 text-slate-500 py-12 px-4 text-center border-t border-slate-900">
        <div class="max-w-4xl mx-auto text-slate-400">
            <p class="text-white font-bold text-lg mb-2 italic">Submódulo 2: Implementa Bases de Datos No Relacionales</p>
            <p class="text-sm uppercase tracking-widest font-medium">Docente: Ing. Cruz Enrique Garcia Ramos • CBTis 134</p>
        </div>
    </footer>

    <script>
        const contentData = {
            6: {
                title: "Introducción al Aggregation Framework",
                subtitle: "Semana 6: Concepto de Tubería (Pipeline)",
                theory: `El **Aggregation Framework** es el motor de procesamiento de MongoDB. Imagínalo como una **banda transportadora** de una fábrica: los datos entran crudos al principio y pasan por diferentes estaciones (**Stages**) donde se filtran, transforman y moldean.
                        <br><br>
                        <strong>Componentes de la Tubería:</strong>
                        <ul class="list-disc ml-5 mt-4 space-y-4 text-slate-700">
                            <li><strong>$match:</strong> Filtra los documentos de la misma forma que <code>find()</code>. Es el primer paso para procesar solo lo necesario.</li>
                            <li><strong>$project:</strong> Modifica la estructura de salida. Renombra campos o crea nuevos basados en cálculos.</li>
                            <li><strong>$sort / $limit:</strong> Ordena y restringe el flujo de datos procesados.</li>
                        </ul>
                        <br>
                        <div class="p-5 bg-indigo-50 rounded-2xl border border-indigo-200">
                            <h5 class="font-bold text-indigo-900 mb-4 uppercase text-[10px] tracking-widest text-center">Diagrama de Flujo del Pipeline</h5>
                            <div class="flex items-center justify-between gap-2 max-w-md mx-auto">
                                <div class="diagram-node">COLECCIÓN <br> (Datos Brutos)</div>
                                <div class="diagram-arrow"><i class="fas fa-long-arrow-alt-right"></i></div>
                                <div class="diagram-node bg-indigo-100">$match <br> (Filtrar)</div>
                                <div class="diagram-arrow"><i class="fas fa-long-arrow-alt-right"></i></div>
                                <div class="diagram-node bg-indigo-100">$project <br> (Moldear)</div>
                                <div class="diagram-arrow"><i class="fas fa-long-arrow-alt-right"></i></div>
                                <div class="diagram-node font-bold border-indigo-500">RESULTADO</div>
                            </div>
                        </div>`,
                image: "https://images.unsplash.com/photo-1518186285589-2f7649de83e0?q=80&w=800&auto=format&fit=crop",
                concepts: ["Aggregation Pipeline", "Stages", "$match", "$project"],
                code: `// EJEMPLO: Filtrar alumnos aprobados y mostrar solo nombre y calif\ndb.alumnos.aggregate([\n  { \n    $match: { "promedio": { $gte: 6 } } \n  },\n  { \n    $project: { \n      "_id": 0, \n      "estudiante": "$nombre", \n      "nota_final": "$promedio" \n    } \n  }\n]);`,
                exercise: `<strong>Laboratorio de Pipeline:</strong><br><br>
                           <strong>Contexto:</strong> Tienes una colección de 'Ventas'.<br><br>
                           <strong>Ejercicio:</strong> Crea una tubería que busque ventas mayores a $500, ordénalas de la más cara a la más barata y muestra solo el campo 'cliente' y 'total'.`
            },
            7: {
                title: "Agrupamiento y Acumuladores",
                subtitle: "Semana 7: Análisis de Datos Masivos",
                theory: `Aquí es donde MongoDB se convierte en una herramienta de Business Intelligence. Con **$group**, podemos resumir millones de documentos en estadísticas útiles.
                        <br><br>
                        <strong>Acumuladores Clave:</strong>
                        <ul class="list-disc ml-5 mt-4 space-y-4 text-slate-700">
                            <li><strong>$sum:</strong> Suma valores o cuenta documentos (usando 1).</li>
                            <li><strong>$avg:</strong> Calcula el promedio aritmético de un campo numérico.</li>
                            <li><strong>$max / $min:</strong> Encuentra los valores extremos del grupo.</li>
                        </ul>
                        <br>
                        <strong>Transformación con $unwind:</strong>
                        <p class="text-sm text-slate-600 italic">Si un documento tiene un arreglo (ej: materias: ["A", "B"]), <strong>$unwind</strong> lo "desenrolla" creando un documento individual por cada materia para poder contarlas por separado.</p>`,
                image: "https://images.unsplash.com/photo-1551288049-bbda38a5f9a2?q=80&w=800&auto=format&fit=crop",
                concepts: ["$group", "Accumulators", "$unwind", "Data Reshaping"],
                code: `// EJEMPLO: Calcular promedio de precio por categoría\ndb.productos.aggregate([\n  { \n    $group: { \n      "_id": "$categoria", \n      "total_articulos": { $sum: 1 },\n      "precio_promedio": { $avg: "$precio" }\n    } \n  }\n]);`,
                exercise: `<strong>Reto de Analítica:</strong><br><br>
                           <strong>Contexto:</strong> Colección 'Restaurante'. Cada documento tiene un arreglo 'platillos'.<br><br>
                           <strong>Ejercicio:</strong> Usa <code>$unwind</code> para separar los platillos y luego <code>$group</code> para contar cuántas veces se ha vendido cada platillo en total.`
            },
            8: {
                title: "Relacionamiento: $lookup",
                subtitle: "Semana 8: Uniendo Colecciones (Left Outer Join)",
                theory: `Aunque MongoDB es No Relacional, a veces necesitamos unir datos de dos colecciones diferentes. Para eso existe **$lookup**.
                        <br><br>
                        <strong>Funcionamiento de $lookup:</strong>
                        <ul class="list-disc ml-5 mt-4 space-y-3 text-slate-700">
                            <li><strong>from:</strong> La colección con la que queremos unirnos.</li>
                            <li><strong>localField:</strong> El campo en la colección actual (ej: cliente_id).</li>
                            <li><strong>foreignField:</strong> El campo en la otra colección (ej: _id).</li>
                            <li><strong>as:</strong> El nombre del nuevo campo (arreglo) donde se guardarán los resultados encontrados.</li>
                        </ul>
                        <br>
                        <div class="example-box">
                            <i class="fas fa-link text-indigo-600 mr-2"></i><strong>Diagrama Lógico:</strong><br>
                            <span class="text-xs">Colección VENTAS (id_producto) ───▶ Colección PRODUCTOS (_id) = RESULTADO UNIDO</span>
                        </div>`,
                image: "https://images.unsplash.com/photo-1558494949-ef010cbdcc51?q=80&w=800&auto=format&fit=crop",
                concepts: ["$lookup", "Relational NoSQL", "Left Join", "Data Merging"],
                code: `// EJEMPLO: Unir ventas con los datos del producto\ndb.ventas.aggregate([\n  {\n    $lookup: {\n      from: "productos",\n      localField: "sku_producto",\n      foreignField: "sku",\n      as: "detalle_producto"\n    }\n  }\n]);`,
                exercise: `<strong>Laboratorio de Uniones:</strong><br><br>
                           <strong>Contexto:</strong> Tienes colecciones 'Autores' y 'Libros'.<br><br>
                           <strong>Ejercicio:</strong> Realiza un lookup para mostrar cada Autor junto con un arreglo de todos los Libros que ha escrito.`
            },
            9: {
                title: "Estrategias de Indexación Avanzada",
                subtitle: "Semana 9: Índices Multillave y Compuestos",
                theory: `Un índice simple (un solo campo) no siempre es suficiente para consultas complejas.
                        <br><br>
                        <strong>Tipos de Índices Profesionales:</strong>
                        <ul class="list-disc ml-5 mt-4 space-y-4 text-slate-700">
                            <li><strong>Compuestos:</strong> Indexan dos o más campos juntos. El orden importa (ej: {ciudad: 1, apellido: 1}). Optimiza búsquedas que filtran por ambos criterios.</li>
                            <li><strong>Multillave:</strong> Se crean automáticamente cuando indexas un campo que contiene un **arreglo**.</li>
                            <li><strong>TTL (Time To Live):</strong> Índices especiales que borran el documento automáticamente después de cierto tiempo (ideal para sesiones o logs).</li>
                        </ul>`,
                image: "https://images.unsplash.com/photo-1454165833762-0204b28c6797?q=80&w=800&auto=format&fit=crop",
                concepts: ["Compound Index", "Multikey Index", "TTL Index", "Query ESR Rule"],
                code: `// Crear índice compuesto (Ciudad asc, Edad desc)\ndb.usuarios.createIndex({ "ciudad": 1, "edad": -1 });\n\n// Crear índice TTL (Borrar en 1 hora / 3600 seg)\ndb.sesiones.createIndex({ "fecha_creacion": 1 }, { expireAfterSeconds: 3600 });`,
                exercise: `<strong>Reto de Performance:</strong><br><br>
                           <strong>Ejercicio:</strong> Si tienes una base de datos de 'Inmobiliaria' y los usuarios buscan por 'zona' y 'precio_maximo', ¿Cómo crearías el índice compuesto más eficiente? Escribe el comando.`
            },
            10: {
                title: "Performance & Profiling",
                subtitle: "Semana 10: Auditoría de Consultas",
                theory: `Como ingenieros, no solo hacemos que funcione, hacemos que sea rápido. El método **.explain()** es nuestro "rayo x" para ver qué hace el motor de base de datos.
                        <br><br>
                        <strong>Estados de Ejecución a vigilar:</strong>
                        <ul class="list-disc ml-5 mt-4 space-y-4 text-slate-700">
                            <li><strong>COLLSCAN:</strong> (Peligro) MongoDB leyó todos los documentos. Necesitas un índice urgente.</li>
                            <li><strong>IXSCAN:</strong> (Éxito) MongoDB usó un índice para encontrar los datos.</li>
                            <li><strong>ExecutionTimeMillis:</strong> El tiempo real que tardó la consulta. Debe ser lo más cercano a 0.</li>
                        </ul>
                        <br>
                        <strong>Capped Collections:</strong>
                        <p class="text-sm text-slate-600 italic">Colecciones de tamaño fijo que funcionan como un círculo: cuando se llenan, los datos nuevos sobrescriben a los más viejos automáticamente.</p>`,
                image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=800&auto=format&fit=crop",
                concepts: ["Explain Plan", "Profiling", "Capped Collections", "Performance Tuning"],
                code: `// Analizar una consulta paso a paso\ndb.ventas.find({ "total": { $gt: 5000 } }).explain("executionStats");\n\n// Crear una colección circular de 1MB máximo\ndb.createCollection("logs_sistema", { capped: true, size: 1048576 });`,
                exercise: `<strong>Auditoría Técnica:</strong><br><br>
                           <strong>Actividad:</strong> Ejecuta un <code>.explain()</code> en tu colección del OXXO para una búsqueda de precio. Toma captura del apartado 'winningPlan' y explica si se usó un índice (IXSCAN) o no (COLLSCAN).`
            }
        };

        function switchWeek(num) {
            // UI Update: Botones
            for(let i=6; i<=10; i++) {
                const btn = document.getElementById('tab'+i);
                btn.className = "week-tab text-slate-600 flex-1 min-w-[110px] py-4 rounded-xl font-bold text-xs uppercase flex flex-col items-center hover:bg-white/50 transition";
            }
            document.getElementById('tab'+num).className = "week-tab active flex-1 min-w-[110px] py-4 rounded-xl font-bold text-xs uppercase flex flex-col items-center";

            // Data Update
            const d = contentData[num];
            const container = document.getElementById('week-content');
            
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
                    <div class="space-y-6 text-slate-800">
                        <div>
                            <div class="flex flex-wrap gap-2 mb-4">
                                ${d.concepts.map(c => `<span class="concept-badge"><i class="fas fa-microchip mr-1 opacity-50"></i>${c}</span>`).join('')}
                            </div>
                            <h2 class="text-3xl md:text-4xl font-black text-slate-900 leading-tight">${d.title}</h2>
                            <p class="text-indigo-600 font-bold text-xs mt-2 uppercase tracking-widest italic border-l-2 border-indigo-600 pl-2">${d.subtitle}</p>
                        </div>
                        
                        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 leading-relaxed theory-card">
                            <h4 class="font-bold text-slate-900 mb-6 border-b border-slate-100 pb-3 flex items-center">
                                <i class="fas fa-book-open mr-2 text-indigo-600"></i> Marco Teórico
                            </h4>
                            <div class="text-[17px] space-y-4">
                                ${d.theory}
                            </div>
                        </div>

                        <div class="bg-indigo-600 p-8 rounded-3xl shadow-lg relative overflow-hidden text-white group border-b-8 border-indigo-900">
                            <i class="fas fa-terminal absolute -right-6 -bottom-6 text-9xl opacity-10 transition-transform group-hover:scale-110"></i>
                            <h4 class="font-black text-indigo-200 text-[10px] uppercase tracking-tighter mb-2">
                                <i class="fas fa-laptop-code mr-1"></i> Reto de Laboratorio
                            </h4>
                            <div class="text-white font-bold text-sm italic leading-snug">${d.exercise}</div>
                        </div>
                    </div>

                    <div class="space-y-8">
                        <div class="rounded-3xl overflow-hidden shadow-2xl h-72 border-4 border-white relative group">
                            <img src="${d.image}" alt="Apoyo Visual" class="w-full h-full object-cover transition transform group-hover:scale-105 duration-1000" onerror="this.src='https://placehold.co/800x600/1e1b4b/ffffff?text=NoSQL+Architecture'">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>
                            <div class="absolute bottom-6 left-6 text-white">
                                <p class="text-xs font-bold uppercase tracking-widest opacity-70 mb-1">CBTis 134 • Especialidad</p>
                                <p class="text-xl font-black italic tracking-tighter">Programación de Datos Masivos</p>
                            </div>
                        </div>

                        <div class="code-container p-6 rounded-3xl shadow-2xl overflow-hidden">
                            <div class="flex space-x-2 mb-6 border-b border-slate-800 pb-4">
                                <div class="w-2.5 h-2.5 rounded-full bg-red-500/80"></div>
                                <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/80"></div>
                                <div class="w-2.5 h-2.5 rounded-full bg-green-500/80"></div>
                                <span class="text-[10px] text-slate-500 font-mono pl-3 tracking-widest uppercase italic font-bold">Query_Engine_v2.bin</span>
                            </div>
                            <pre class="font-mono text-indigo-200 text-sm overflow-x-auto py-2 leading-relaxed selection:bg-indigo-500 selection:text-white"><code>${d.code}</code></pre>
                            <button onclick="copyCode(this)" class="mt-8 w-full bg-indigo-600 hover:bg-indigo-700 text-white text-[10px] font-black py-4 rounded-xl transition-all flex items-center justify-center space-x-2 shadow-lg active:scale-95 uppercase tracking-widest border border-indigo-400">
                                <i class="fas fa-copy"></i> <span>Copiar Sintaxis de Clase</span>
                            </button>
                        </div>
                        
                        <div class="p-4 bg-indigo-50 rounded-2xl flex items-center space-x-4 border border-indigo-100">
                             <div class="bg-white p-3 rounded-xl shadow-sm"><i class="fas fa-info-circle text-indigo-500 text-xl"></i></div>
                             <p class="text-[11px] font-bold text-slate-600 uppercase tracking-tight leading-tight italic">Referencia: El Framework de Agregación es la base para el análisis en Big Data.</p>
                        </div>
                    </div>
                </div>
            `;

            container.classList.remove('animate-content');
            void container.offsetWidth; 
            container.classList.add('animate-content');
        }

        function copyCode(btn) {
            const code = btn.previousElementSibling.innerText;
            const temp = document.createElement('textarea');
            temp.value = code;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> <span>¡CÓDIGO COPIADO!</span>';
            btn.classList.replace('bg-indigo-600', 'bg-emerald-600');
            btn.classList.replace('border-indigo-400', 'border-emerald-400');
            setTimeout(() => { 
                btn.innerHTML = original; 
                btn.classList.replace('bg-emerald-600', 'bg-indigo-600');
                btn.classList.replace('border-emerald-400', 'border-indigo-400');
            }, 2000);
        }

        window.onload = () => switchWeek(6);
    </script>
</body>
</html>
