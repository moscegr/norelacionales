    <script>
        const contentData = {
            6: {
                title: "Inmersión al Aggregation Framework",
                subtitle: "Semana 6: Teoría de la Tubería de Datos",
                theory: `Para procesar Big Data, el comando <code>find()</code> es insuficiente. El **Framework de Agregación** permite ejecutar análisis complejos directamente en el servidor, devolviendo solo el resultado final.
                        <br><br>
                        <strong>Etapas Fundamentales (Stages):</strong>
                        <ul class="list-disc ml-5 mt-4 space-y-4 text-slate-700">
                            <li><strong>$match:</strong> Filtro de entrada. Elimina documentos que no cumplen criterios antes de procesarlos.</li>
                            <li><strong>$project:</strong> El escultor. Permite renombrar campos, crear calculados (ej. Precio * Stock) o extraer partes de fechas con <code>$year</code> o <code>$month</code>.</li>
                            <li><strong>$limit / $skip:</strong> Control de flujo para paginación de datos a gran escala.</li>
                        </ul>
                        <br>
                        <div class="p-5 bg-indigo-50 rounded-2xl border border-indigo-200">
                            <h5 class="font-bold text-indigo-900 mb-4 uppercase text-[10px] tracking-widest text-center">Tubería de Procesamiento</h5>
                            <div class="flex flex-wrap items-center justify-center gap-4">
                                <div class="diagram-node">ENTRADA (10k docs)</div>
                                <div class="diagram-arrow">➔</div>
                                <div class="diagram-node bg-blue-50">$match (Filter)</div>
                                <div class="diagram-arrow">➔</div>
                                <div class="diagram-node bg-emerald-50">$project (Shape)</div>
                                <div class="diagram-arrow">➔</div>
                                <div class="diagram-node font-bold border-indigo-500 text-indigo-600">RESULTADO (50 docs)</div>
                            </div>
                        </div>
                        <br>
                        <strong>Ejemplo de Campo Calculado:</strong>
                        <div class="example-box mt-2">
                            <p class="text-sm">Si vendemos productos en una ferretería y queremos saber el valor total de cada producto en inventario:</p>
                            <code class="text-xs bg-slate-200 p-1 rounded font-mono">"{ $project: { subtotal: { $multiply: ['$precio', '$stock'] } } }"</code>
                        </div>`,
                image: "https://images.unsplash.com/photo-1551288049-bbda38a5f9a2?q=80&w=800&auto=format&fit=crop",
                concepts: ["Aggregation Pipeline", "Stages", "Data Streams", "$project Logic"],
                code: `// CONTEXTO: SISTEMA FERRETERO\n// Reto: Productos caros con cálculo de IVA\n\ndb.productos.aggregate([\n  { \n    "$match": { "precio": { "$gt": 1000 }, "activo": true } \n  },\n  { \n    "$project": { \n      "_id": 0, \n      "producto": { "$toUpper": "$nombre" }, \n      "stock_actual": "$stock",\n      "precio_iva": { "$multiply": ["$precio", 1.16] },\n      "es_escasez": { "$lt": ["$stock", 5] } \n    } \n  }\n]);`,
                exercise: `<strong>Laboratorio Extendido:</strong><br><br>
                           <span class="step-pill">1</span> <strong>Filtros Compuestos:</strong> Filtra productos de 'Electrónica' que tengan stock entre 10 y 50 unidades y que el proveedor sea "Sony".<br><br>
                           <span class="step-pill">2</span> <strong>Transformación de Datos:</strong> Crea una proyección que oculte el ID, ponga el nombre en mayúsculas y cree un campo "etiqueta_precio" que diga "CARO" si el precio > 5000.<br><br>
                           <span class="step-pill">3</span> <strong>Análisis Temporal:</strong> Suponiendo que tienes un campo 'fecha_ingreso', usa "$project" y "$month" para mostrar el nombre del producto y el mes en que entró al almacén.<br><br>
                           <span class="step-pill">4</span> <strong>Paginación Dinámica:</strong> Crea una consulta que ignore los primeros 10 registros (<code>$skip</code>) y devuelva solo los siguientes 5 (<code>$limit</code>), mostrando únicamente el nombre y el precio.<br><br>
                           <span class="step-pill">5</span> <strong>Lógica de Stock:</strong> Genera un reporte que use <code>$project</code> para mostrar un campo "estado" que sea "REABASTECER" si el stock es menor a 10, y "OK" en caso contrario (usa <code>$cond</code>).<br><br>
                           <span class="step-pill">6</span> <strong>Concatenación Profesional:</strong> Utiliza el operador <code>$concat</code> dentro de una proyección para unir el campo "marca" y "nombre" en un solo campo llamado "identificador_unico".`
            },
            7: {
                title: "Análisis de Datos: Agrupamiento Profundo",
                subtitle: "Semana 7: Inteligencia de Negocios NoSQL",
                theory: `La etapa **$group** es el motor estadístico de MongoDB. Permite resumir información masiva en métricas de negocio accionables.
                        <br><br>
                        <strong>Acumuladores Avanzados:</strong>
                        <ul class="list-disc ml-5 mt-4 space-y-4 text-slate-700">
                            <li><strong>$push:</strong> Crea un arreglo con los valores de los documentos agrupados. Útil para ver "todos los productos vendidos por un cajero".</li>
                            <li><strong>$addToSet:</strong> Igual que push, pero evita duplicados (crea un conjunto único).</li>
                            <li><strong>$sum / $avg:</strong> Cálculos matemáticos básicos sobre el grupo.</li>
                        </ul>
                        <br>
                        <strong>Desenrollado de Arreglos ($unwind):</strong>
                        <p class="text-sm text-slate-600 italic">Si un documento tiene un arreglo de etiquetas, $unwind crea una copia del documento por cada etiqueta. Esto permite agrupar por etiqueta individualmente.</p>`,
                image: "https://images.unsplash.com/photo-1551288049-bbda38a5f9a2?q=80&w=800&auto=format&fit=crop",
                concepts: ["$group", "Accumulators", "$unwind", "BI Analytics"],
                code: `// CONTEXTO: TIENDA OXXO\n// Reto: Ventas totales por categoría y lista de productos únicos\n\ndb.ventas.aggregate([\n  { "$unwind": "$productos" }, // Desglosa lista de productos\n  { \n    "$group": { \n      "_id": "$productos.categoria", \n      "total_venta": { "$sum": "$productos.precio" },\n      "nombres_productos": { "$addToSet": "$productos.nombre" }\n    } \n  }\n]);`,
                exercise: `<strong>Laboratorio de Estadísticas (8 Horas):</strong><br><br>
                           <span class="step-pill">1</span> <strong>Resumen Financiero (2h):</strong> Calcula el promedio de precio y el total de stock agrupado por "Proveedor".<br><br>
                           <span class="step-pill">2</span> <strong>Análisis de Preferencias (3h):</strong> En una colección de 'Usuarios', agrupa por 'Ciudad' y usa <code>$push</code> para listar los nombres de todos los usuarios de esa ciudad.<br><br>
                           <span class="step-pill">3</span> <strong>Top Mensual (3h):</strong> Agrupa las ventas por mes y año, calcula el total recaudado y ordena los meses de mayor a menor ganancia.`
            },
            8: {
                title: "Uniones y Relacionamiento ($lookup)",
                subtitle: "Semana 8: Modelado Relacional en NoSQL",
                theory: `**$lookup** permite traer datos de otras colecciones. Aunque MongoDB prefiere el *Embedding*, hay casos (como catálogos de proveedores o perfiles de usuario) donde el *Linking* es necesario.
                        <br><br>
                        <strong>Sintaxis de Tubería Interna (Avanzado):</strong>
                        <p class="text-sm text-slate-700 mb-4">Podemos usar <code>pipeline</code> dentro de un lookup para filtrar los datos de la colección externa antes de unirlos, optimizando la memoria RAM del servidor.</p>
                        <div class="example-box">
                            <i class="fas fa-link text-indigo-600 mr-2"></i><strong>Lógica de Unión:</strong><br>
                            <span class="text-xs">DOC PRINCIPAL (localField) <---> DOC EXTERNO (foreignField) = ARREGLO DE RESULTADOS</span>
                        </div>`,
                image: "https://images.unsplash.com/photo-1558494949-ef010cbdcc51?q=80&w=800&auto=format&fit=crop",
                concepts: ["Relational Joins", "$lookup Pipeline", "Data Merging", "Foreign Keys"],
                code: `// CONTEXTO: SISTEMA DE PEDIDOS\n// Reto: Pedidos unidos con datos de clientes, ocultando datos sensibles\n\ndb.pedidos.aggregate([\n  {\n    "$lookup": {\n      "from": "clientes",\n      "localField": "id_cliente",\n      "foreignField": "_id",\n      "as": "info_cliente"\n    }\n  },\n  { "$unwind": "$info_cliente" },\n  { "$project": { "info_cliente.password": 0, "info_cliente.token": 0 } }\n]);`,
                exercise: `<strong>Taller de Integración (8 Horas):</strong><br><br>
                           <span class="step-pill">1</span> <strong>Unión Simple (2h):</strong> Une la colección 'Productos' con 'Proveedores'. Muestra el nombre del producto y el teléfono del proveedor.<br><br>
                           <span class="step-pill">2</span> <strong>Unión Doble (3h):</strong> Une 'Ventas' con 'Productos' y luego con 'Vendedores'. Crea un reporte donde se vea quién vendió qué cosa.<br><br>
                           <span class="step-pill">3</span> <strong>Filtros en Unión (3h):</strong> Usa un lookup para traer solo los comentarios de una 'Publicación' que tengan más de 5 likes (Usa <code>pipeline</code> dentro del <code>$lookup</code>).`
            },
            9: {
                title: "Estrategias de Indexación Avanzada",
                subtitle: "Semana 9: Optimizando el Tiempo de Respuesta",
                theory: `Los índices son la diferencia entre una consulta de 5 segundos y una de 5 milisegundos.
                        <br><br>
                        <strong>Tipos de Índices en Producción:</strong>
                        <ul class="list-disc ml-5 mt-4 space-y-4 text-slate-700">
                            <li><strong>Índice Compuesto:</strong> Indexa varios campos a la vez. Regla ESR: Equality (Igualdad), Sort (Orden), Range (Rango).</li>
                            <li><strong>Índice Único:</strong> Garantiza que no haya duplicados (ej: correos electrónicos o CURP).</li>
                            <li><strong>Índice TTL:</strong> Borra documentos automáticamente tras un tiempo (ideal para sesiones de usuario).</li>
                            <li><strong>Índice Parcial:</strong> Solo indexa documentos que cumplen una condición (ahorra espacio en disco).</li>
                        </ul>`,
                image: "https://images.unsplash.com/photo-1454165833762-0204b28c6797?q=80&w=800&auto=format&fit=crop",
                concepts: ["Compound Index", "TTL & Unique", "Partial Indexes", "ESR Rule"],
                code: `// EJEMPLO: Configuración de Índices Profesionales\n\n// 1. Índice Compuesto para búsquedas de stock por tienda\ndb.inventario.createIndex({ "tienda_id": 1, "stock": -1 });\n\n// 2. Índice Parcial: Indexar solo productos de lujo para búsqueda rápida\ndb.productos.createIndex(\n  { "nombre": 1 },\n  { "partialFilterExpression": { "precio": { "$gt": 10000 } } }\n);`,
                exercise: `<strong>Laboratorio de Rendimiento (8 Horas):</strong><br><br>
                           <span class="step-pill">1</span> <strong>Seguridad de Datos (2h):</strong> Crea un índice único para el campo 'sku' de tus productos. Intenta insertar un duplicado y documenta el error.<br><br>
                           <span class="step-pill">2</span> <strong>Optimización de Sesiones (3h):</strong> Crea una colección 'logs' y configúrale un índice TTL para que los registros se borren automáticamente después de 24 horas.<br><br>
                           <span class="step-pill">3</span> <strong>Búsqueda Multicriterio (3h):</strong> Crea el índice compuesto óptimo para buscar alumnos por 'especialidad' (Igualdad) y ordenarlos por 'promedio' (Orden).`
            },
            10: {
                title: "Profiling & Performance Tuning",
                subtitle: "Semana 10: Auditoría de Consultas",
                theory: `Un ingeniero NoSQL audita su código. Usamos **.explain("executionStats")** para ver cómo trabaja el motor.
                        <br><br>
                        <strong>Análisis de Resultados:</strong>
                        <ul class="list-disc ml-5 mt-4 space-y-3 text-slate-700">
                            <li><strong>COLLSCAN:</strong> Malo. Se leyó toda la colección.</li>
                            <li><strong>IXSCAN:</strong> Bueno. Se usó un índice.</li>
                            <li><strong>Covered Query:</strong> Excelente. MongoDB no tocó el disco duro; respondió usando solo los datos del índice en memoria RAM.</li>
                        </ul>
                        <br>
                        <strong>Capped Collections:</strong>
                        <p class="text-sm text-slate-600 italic">Colecciones de tamaño fijo para streaming de datos (logs, chats, sensores) donde los datos viejos se borran automáticamente al llenarse el espacio.</p>`,
                image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=800&auto=format&fit=crop",
                concepts: ["Execution Plan", "Covered Queries", "Capped Colls", "Query Tuning"],
                code: `// EJEMPLO: Auditoría Técnica\n\n// Analizar si una consulta usa índices correctamente\ndb.usuarios.find({ "email": "er@mail.com" }).explain("executionStats");\n\n// Crear colección circular de 10MB para histórico de errores\ndb.createCollection("error_logs", { "capped": true, "size": 10485760, "max": 1000 });`,
                exercise: `<strong>Evaluación de Eficiencia (8 Horas):</strong><br><br>
                           <span class="step-pill">1</span> <strong>Diagnóstico (2h):</strong> Ejecuta una búsqueda por nombre en tu base de datos y usa <code>explain()</code>. ¿Cuántos documentos examinó? Documenta el tiempo.<br><br>
                           <span class="step-pill">2</span> <strong>Refactorización (3h):</strong> Crea un índice para ese campo y repite el proceso. Compara los milisegundos y los documentos examinados.<br><br>
                           <span class="step-pill">3</span> <strong>Arquitectura de Logs (3h):</strong> Crea una Capped Collection para tu sistema OXXO que guarde los últimos 500 movimientos de caja.`
            }
        };

        function switchWeek(num) {
            // UI Update: Botones
            for(let i=6; i<=10; i++) {
                const btn = document.getElementById('tab'+i);
                if(btn) btn.className = "week-tab text-slate-600 flex-1 min-w-[110px] py-4 rounded-xl font-bold text-xs uppercase flex flex-col items-center hover:bg-white/50 transition";
            }
            document.getElementById('tab'+num).className = "week-tab active flex-1 min-w-[110px] py-4 rounded-xl font-bold text-xs uppercase flex flex-col items-center";

            // Data Update
            const d = contentData[num];
            const container = document.getElementById('week-content');
            
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
                    <div class="space-y-6 text-slate-800">
                        <div>
                            <div class="flex flex-wrap gap-2 mb-4">
                                ${d.concepts.map(c => `<span class="concept-badge"><i class="fas fa-microchip mr-1 opacity-50"></i>${c}</span>`).join('')}
                            </div>
                            <h2 class="text-3xl md:text-4xl font-black text-slate-900 leading-tight">${d.title}</h2>
                            <p class="text-indigo-600 font-bold text-xs mt-2 uppercase tracking-widest italic border-l-2 border-indigo-600 pl-2">${d.subtitle}</p>
                        </div>
                        
                        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 leading-relaxed theory-card">
                            <h4 class="font-bold text-slate-900 mb-6 border-b border-slate-100 pb-3 flex items-center">
                                <i class="fas fa-book-open mr-2 text-indigo-600"></i> Lección Teórica Detallada
                            </h4>
                            <div class="text-[17px] space-y-4">
                                ${d.theory}
                            </div>
                        </div>

                        <div class="bg-indigo-600 p-8 rounded-3xl shadow-lg relative overflow-hidden text-white group border-b-8 border-indigo-900">
                            <i class="fas fa-terminal absolute -right-6 -bottom-6 text-9xl opacity-10 transition-transform group-hover:scale-110"></i>
                            <h4 class="font-black text-indigo-200 text-[10px] uppercase tracking-tighter mb-2">
                                <i class="fas fa-laptop-code mr-1"></i> Retos Semanales (Laboratorio de Inmersión)
                            </h4>
                            <div class="text-white font-bold text-sm italic leading-snug">${d.exercise}</div>
                        </div>
                    </div>

                    <div class="space-y-8">
                        <div class="rounded-3xl overflow-hidden shadow-2xl h-72 border-4 border-white relative group">
                            <img src="${d.image}" alt="Concepto Visual Técnico" class="w-full h-full object-cover transition transform group-hover:scale-105 duration-1000" onerror="this.src='https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=800&auto=format&fit=crop'">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>
                            <div class="absolute bottom-6 left-6 text-white">
                                <p class="text-xs font-bold uppercase tracking-widest opacity-70 mb-1">CBTis 134 • Especialidad</p>
                                <p class="text-xl font-black italic tracking-tighter">Programación de Datos Masivos</p>
                            </div>
                        </div>

                        <div class="code-container p-6 rounded-3xl shadow-2xl overflow-hidden">
                            <div class="flex space-x-2 mb-6 border-b border-slate-800 pb-4">
                                <div class="w-2.5 h-2.5 rounded-full bg-red-500/80"></div>
                                <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/80"></div>
                                <div class="w-2.5 h-2.5 rounded-full bg-green-500/80"></div>
                                <span class="text-[10px] text-slate-500 font-mono pl-3 tracking-widest uppercase italic font-bold">Query_Engine_v2.bin</span>
                            </div>
                            <pre class="font-mono text-indigo-200 text-sm overflow-x-auto py-2 leading-relaxed selection:bg-indigo-500 selection:text-white"><code>${d.code}</code></pre>
                            <button onclick="copyCode(this)" class="mt-8 w-full bg-indigo-600 hover:bg-indigo-700 text-white text-[10px] font-black py-4 rounded-xl transition-all flex items-center justify-center space-x-2 shadow-lg active:scale-95 uppercase tracking-widest border border-indigo-400">
                                <i class="fas fa-copy"></i> <span>Copiar Sintaxis de Clase</span>
                            </button>
                        </div>
                        
                        <div class="p-4 bg-indigo-50 rounded-2xl flex items-center space-x-4 border border-indigo-100">
                             <div class="bg-white p-3 rounded-xl shadow-sm"><i class="fas fa-info-circle text-indigo-500 text-xl"></i></div>
                             <p class="text-[11px] font-bold text-slate-600 uppercase tracking-tight leading-tight italic">Referencia: El Framework de Agregación es la base para el análisis en Big Data.</p>
                        </div>
                    </div>
                </div>
            `;

            container.classList.remove('animate-content');
            void container.offsetWidth; 
            container.classList.add('animate-content');
        }

        function copyCode(btn) {
            const code = btn.previousElementSibling.innerText;
            const temp = document.createElement('textarea');
            temp.value = code;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> <span>¡CÓDIGO COPIADO!</span>';
            btn.classList.replace('bg-indigo-600', 'bg-emerald-600');
            btn.classList.replace('border-indigo-400', 'border-emerald-400');
            setTimeout(() => { 
                btn.innerHTML = original; 
                btn.classList.replace('bg-emerald-600', 'bg-indigo-600');
                btn.classList.replace('border-emerald-400', 'border-indigo-400');
            }, 2000);
        }

        window.onload = () => switchWeek(6);
    </script>
</body>
</html>
